name: Android APK Build (Debug)

on:
  push:
    branches: [ "main", "master", "fix/**", "feat/**", "feature/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build FFmpeg + APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Cache FFmpeg source
        uses: actions/cache@v4
        with:
          path: build/ffmpeg-android/source
          key: ffmpeg-source-${{ hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl xz-utils make

      - name: Build FFmpeg for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash scripts/build-ffmpeg.sh arm64-v8a

      - name: Build FFmpeg for armeabi-v7a
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash scripts/build-ffmpeg.sh armeabi-v7a

      - name: Build FFmpeg for x86_64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash scripts/build-ffmpeg.sh x86_64

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: List generated APKs
        run: |
          echo "=== Generated APK files ==="
          find app/build/outputs/apk -name "*.apk" | sort

      - name: Upload Debug APK(s)
        uses: actions/upload-artifact@v4
        with:
          name: Audiora-debug-apks
          path: app/build/outputs/apk/*/debug/*.apk
