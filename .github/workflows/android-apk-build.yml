name: Android APK Build (Debug)

on:
  push:
    branches: [ "main", "master", "fix/**", "feat/**", "feature/**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Extract App Version & Rename APK
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = .*: "([^"]+)".*/\1/')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0"
          fi
          APP_NAME="Audiora"
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            NEW_DEBUG_APK="${APP_NAME}_v${VERSION_NAME}-debug.apk"
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${NEW_DEBUG_APK}
            echo "DEBUG_APK_NAME=${NEW_DEBUG_APK}" >> $GITHUB_ENV
            echo "Created debug APK: ${NEW_DEBUG_APK}"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.VERSION_NAME }}-debug-apk
          path: app/build/outputs/apk/debug/${{ env.DEBUG_APK_NAME }}
