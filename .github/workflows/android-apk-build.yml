name: Android APK Build & Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [published, created]

jobs:
  build:
    name: Build APK and Attach Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Extract App Version & Rename APK
        run: |
          # Extract version name from build.gradle.kts
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0"
          fi
          
          APP_NAME="Audiora"
          NEW_APK_NAME="${APP_NAME}_v${VERSION_NAME}.apk"
          
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "APK_NAME=${NEW_APK_NAME}" >> $GITHUB_ENV
          
          # Rename the compiled APK to output (appname + version+ .apk)
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${NEW_APK_NAME}
          echo "Created APK: app/build/outputs/apk/debug/${NEW_APK_NAME}"

      - name: Upload APK as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.VERSION_NAME }}-APK
          path: app/build/outputs/apk/debug/${{ env.APK_NAME }}

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
