name: Android APK Build & Release

on:
  push:
    branches: [ "main", "master", "fix/**", "feat/**", "feature/**" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [published, created]

jobs:
  build:
    name: Build APK and Attach Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Setup Release Signing
        if: github.event_name != 'pull_request'
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: ./scripts/ci_signing_setup.sh

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event_name != 'pull_request'
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/signing/release.keystore" \
            -Pandroid.injected.signing.store.password="$RELEASE_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$RELEASE_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$RELEASE_KEY_PASSWORD"

      - name: Extract App Version & Rename APKs
        run: |
          # Extract version name from build.gradle.kts
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0"
          fi

          APP_NAME="Audiora"

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV

          # Rename debug APK
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            NEW_DEBUG_APK="${APP_NAME}_v${VERSION_NAME}-debug.apk"
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${NEW_DEBUG_APK}
            echo "DEBUG_APK_NAME=${NEW_DEBUG_APK}" >> $GITHUB_ENV
            echo "Created debug APK: ${NEW_DEBUG_APK}"
          fi

          # Rename release APK
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            NEW_RELEASE_APK="${APP_NAME}_v${VERSION_NAME}.apk"
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${NEW_RELEASE_APK}
            echo "RELEASE_APK_NAME=${NEW_RELEASE_APK}" >> $GITHUB_ENV
            echo "Created release APK: ${NEW_RELEASE_APK}"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.VERSION_NAME }}-debug-apk
          path: app/build/outputs/apk/debug/${{ env.DEBUG_APK_NAME }}

      - name: Upload Release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_v${{ env.VERSION_NAME }}-release-apk
          path: app/build/outputs/apk/release/${{ env.RELEASE_APK_NAME }}

      - name: Attach APKs to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/${{ env.DEBUG_APK_NAME }}
            app/build/outputs/apk/release/${{ env.RELEASE_APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
