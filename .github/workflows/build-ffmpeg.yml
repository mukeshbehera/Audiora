name: Build FFmpeg and Android App

on:
  push:
    branches: [main, fix/**, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ffmpeg:
    name: Build FFmpeg (${{ matrix.abi }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            flavor: arm64v8a
          - abi: armeabi-v7a
            flavor: armeabiv7a
          - abi: x86_64
            flavor: x8664
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Cache FFmpeg source
        id: cache-source
        uses: actions/cache@v4
        with:
          path: build/ffmpeg-android/source
          key: ffmpeg-source-${{ hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl xz-utils make

      - name: Build FFmpeg for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          bash scripts/build-ffmpeg.sh ${{ matrix.abi }}

      - name: Upload ${{ matrix.flavor }} asset binaries
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-assets-${{ matrix.flavor }}
          path: app/src/${{ matrix.flavor }}/assets/ffmpeg/
          retention-days: 1
          if-no-files-found: error

  assemble-apks:
    name: Assemble APK (${{ matrix.flavor }})
    needs: build-ffmpeg
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            flavor: arm64v8a
          - abi: armeabi-v7a
            flavor: armeabiv7a
          - abi: x86_64
            flavor: x8664
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download ${{ matrix.flavor }} binary assets
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-assets-${{ matrix.flavor }}
          path: app/src/${{ matrix.flavor }}/assets/ffmpeg/

      - name: Verify assets
        run: |
          ls -la app/src/${{ matrix.flavor }}/assets/ffmpeg/
          file app/src/${{ matrix.flavor }}/assets/ffmpeg/ffmpeg

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.flavor }} debug APK
        run: ./gradlew assemble${{ matrix.flavor }}Debug

      - name: Upload ${{ matrix.flavor }} debug APK
        uses: actions/upload-artifact@v4
        with:
          name: audiora-${{ matrix.flavor }}-debug
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk
          retention-days: 7

      - name: Build ${{ matrix.flavor }} release APK (if signing keys available)
        if: env.KEYSTORE_PATH != ''
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH || '' }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        run: |
          if [ -n "$KEYSTORE_PATH" ] && [ -n "$STORE_PASSWORD" ]; then
            ./gradlew assemble${{ matrix.flavor }}Release
          else
            echo "Skipping release build — signing keys not configured"
          fi

      - name: Upload ${{ matrix.flavor }} release APK
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: audiora-${{ matrix.flavor }}-release
          path: app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk
          retention-days: 7
